name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ts:
    name: TS edges — build · lint · test · verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # The full verify loop includes the cross-language fidelity spike, whose JVM (networknt)
      # verdicts are produced here and cross-checked against Ajv.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # oasdiff (pinned in .ichiflow/resources.manifest.yaml) powers the contract-gate scope.
      - name: Install oasdiff (breaking-change detector, chunk 1.4a)
        run: |
          OASDIFF_VERSION=1.21.0
          curl -fsSL -o /tmp/oasdiff.tar.gz \
            "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/oasdiff.tar.gz -C /tmp oasdiff
          sudo install /tmp/oasdiff /usr/local/bin/oasdiff
          oasdiff --version

      - run: pnpm install --frozen-lockfile

      - name: License allowlist gate (ADR-0016)
        run: pnpm license:check

      - name: Build (schemas + CLI)
        run: pnpm build

      - name: Schema drift check (regenerate-and-diff, doc 02 §4.3)
        run: pnpm schema:drift

      - name: Codegen drift check (TS contract types up-to-date)
        run: pnpm codegen:drift

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Unit tests
        run: pnpm test

      - name: Fidelity spike — JVM (networknt) verdicts
        run: pnpm spike:jvm

      - name: Contract vectors — JVM (networknt) verdicts
        run: pnpm vectors:jvm

      - name: Decision projection spike — DMN 1.6 on KIE/Drools
        run: pnpm decision:jvm

      - name: Contract breaking-change diff (oasdiff, chunk 1.4a)
        run: pnpm contract:diff

      - name: Decision layer — DMN-TCK subset on the SPI reference engine
        run: pnpm decision-tck:jvm

      - name: Decision layer — decision-source→DMN projection coverage (feature matrix)
        run: pnpm projection:jvm

      - name: Decision layer — emit DecisionTrace objects (trace-shape conformance)
        run: pnpm trace:jvm

      - name: Decision layer — scenario suite + rule/row coverage
        run: pnpm scenario:jvm

      - name: Decision layer — FEEL semantics vectors
        run: pnpm feel:jvm

      - name: Flow layer — interpreter determinism spike (Temporal time-skip, chunk 3.0)
        run: pnpm interpreter:spike

      - name: Flow layer — core step-type + Case/Task conformance vectors (compute/decision-eval/human-task w/ assignment-as-Decision·pausable-SLA·escalation/timer, Temporal time-skip, chunk 3.1–3.3)
        run: pnpm flow:conformance

      - name: Flow layer — DecisionRecord assembly + orphan-event detector on committed case fixtures (chunk 3.4)
        run: pnpm decisionrecord:assemble

      - name: Entity store — CRUD + audit-log + transactional-outbox conformance vectors on the Repository SPI (chunk 4.1)
        run: pnpm entity:jvm

      - name: Entity API — generated BFF contract vectors + runtime boundary validation vs emitted OpenAPI (chunk 4.2)
        run: pnpm api:contract

      - name: Authz — PDP allow/deny vectors over the OpenFGA reference engine + design-time = runtime parity (chunk 4.3)
        run: pnpm authz:jvm

      - name: Code quality — detekt + ArchUnit artifacts (SARIF + rule results)
        run: pnpm quality:jvm

      - name: UI — render PDP-state stories + axe-core AA + preview snapshots (uischema, chunk 4.5)
        run: pnpm ui:preview

      - name: Portal — PDP-filtered SLA-ordered inbox + Case/review view harness (action form signals the Flow, chunk 4.4)
        run: pnpm portal:preview

      - name: Adapters — pure Message-Translator mapping goldens + REST/broker/webhook contract round-trips + idempotency/DLQ vectors (chunk 5.1)
        run: pnpm adapters:preview

      - name: ichiflow verify — full loop (every registered scope green)
        run: node packages/cli/dist/cli.js verify --json

  core:
    name: Kotlin core — build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle build
        working-directory: core
        run: ./gradlew build --console=plain --no-daemon

# The resources manifest (doc 10 §2.5, BRIEF §12): version pins + named resources an agent may
# reach for. Schema-validated against @ichiflow/schemas/resources-manifest by the agent-kit scope.
version: "1"

pins:
  - id: node
    version: "20"
    note: TS-edge runtime; engine-strict in .npmrc.
  - id: pnpm
    version: "9.15.0"
    note: Workspace package manager (packageManager field pins it).
  - id: typespec
    version: "0.67.0"
    note: Schema authoring compiler + json-schema/openapi3 emitters (ADR-0006). Bump reruns schema drift.
  - id: jdk
    version: "17"
    note: Kotlin core / future KIE embedding baseline (ADR-0007).
  - id: gradle
    version: "8.10.2"
    note: Kotlin core build (wrapper pinned in core/gradle/wrapper).
  - id: networknt-json-schema-validator
    version: "1.5.4"
    note: Independent JVM JSON Schema 2020-12 validator for the cross-language fidelity spike.
  - id: hey-api-openapi-ts
    version: "0.80.0"
    note: TypeScript contract-type generator from OpenAPI (build plan 1.2). 0.80.x is the last line supporting Node 20; bump reruns codegen drift.
  - id: fabrikt
    version: "26.1.0"
    note: Kotlin contract-model generator from OpenAPI (build plan 1.2). Bump reruns ./gradlew checkModelsUpToDate.
  - id: kie-dmn
    version: "10.2.0"
    note: Apache KIE / Drools DMN — v1 reference decision engine (ADR-0002). Pinned; a bump reruns the decision-projection-spike + decision-layer. DMN 1.6 (spec 20240513).
  - id: oasdiff
    version: "1.21.0"
    note: OpenAPI breaking-change detector for the contract-gate scope (chunk 1.4a). Go release binary; installed in CI and run via `pnpm contract:diff`.
  - id: detekt
    version: "1.23.7"
    note: Kotlin static-analysis gate (non-negotiable). Fails ./gradlew check and the code-quality scope on any finding; config in core/config/detekt/detekt.yml.
  - id: archunit
    version: "1.3.0"
    note: Architecture-rule tests (archunit-junit5) enforcing the Decision Engine SPI boundary. Fails ./gradlew test and the code-quality scope on violation.
  - id: temporalio
    version: "1.11.7"
    note: Temporal TypeScript SDK — durable-execution substrate for the flow interpreter (ADR-0003/0004). Pinned; the time-skipping test env powers the interpreter-determinism-spike. Bump reruns `pnpm interpreter:spike`.

resources:
  - id: run-verify
    kind: skill
    path: .claude/skills/run-verify/SKILL.md
    description: Run ichiflow verify and read the JSON verdict.
  - id: add-schema
    kind: skill
    path: .claude/skills/add-schema/SKILL.md
    description: Author a canonical type in TypeSpec and regenerate.
  - id: verdict-envelope
    kind: schema
    path: schemas/verdict.tsp
    description: The verify verdict envelope contract (doc 13 §3.2).
  - id: self-check
    kind: harness
    path: packages/cli/src/verify/scopes/self-check.ts
    description: The meta-harness — the harness that judges harnesses.
  - id: schema-fidelity-spike
    kind: harness
    path: packages/cli/src/verify/scopes/schema-fidelity-spike.ts
    description: Cross-language JSON Schema fidelity — Ajv (TS) vs networknt (JVM) must agree.
  - id: schema-pipeline
    kind: harness
    path: packages/cli/src/verify/scopes/schema-pipeline.ts
    description: Emitted contract artifacts (OpenAPI 3.1 + JSON Schema 2020-12) exist and are well-formed.
  - id: verify-api
    kind: schema
    path: schemas/service.tsp
    description: The verify status API surface (TypeSpec → OpenAPI 3.1).
  - id: codegen
    kind: harness
    path: packages/cli/src/verify/scopes/codegen.ts
    description: Generated TS (hey-api) + Kotlin (Fabrikt) edges cover every OpenAPI component schema.
  - id: contract-vectors
    kind: harness
    path: packages/cli/src/verify/scopes/contract-vectors.ts
    description: Cross-language accept/reject vectors for the real contract — Ajv (TS) vs networknt (JVM) must agree.
  - id: contract-corpus
    kind: pattern
    path: schemas/vectors/contract-corpus.json
    description: Labelled validation vectors for the real emitted contract (build plan 1.3).
  - id: reference-data
    kind: harness
    path: packages/cli/src/verify/scopes/reference-data.ts
    description: CodeSet fixtures conform to the contract and every cross-CodeSet codeRef resolves to a live, in-window row (ADR-0025).
  - id: codeset-schema
    kind: schema
    path: schemas/reference-data.tsp
    description: The CodeSet reference-data artifact class (TypeSpec → JSON Schema); rows carry codeRef foreign keys.
  - id: codeset-fixtures
    kind: pattern
    path: schemas/reference-data/fixtures
    description: Interdependent CodeSet fixtures exercising cross-version, effective-dated codeRef integrity.
  - id: decision-projection-spike
    kind: harness
    path: packages/cli/src/verify/scopes/decision-projection-spike.ts
    description: Compiled decision-source → DMN 1.6 executes identically to the hand-authored reference on KIE/Drools (build plan 2.0).
  - id: decision-source-fixture
    kind: pattern
    path: schemas/decision-source/fixtures/fee.decision.json
    description: decision-source authoring fixture (hard boxed-expression kinds) projected one-way to DMN (ADR-0027).
  - id: dmn-reference
    kind: pattern
    path: core/src/main/resources/dmn/reference/fee.dmn
    description: Hand-authored DMN 1.6 reference the projection spike executes against for behavioural equivalence.
  - id: decision-layer
    kind: harness
    path: packages/cli/src/verify/scopes/decision-layer.ts
    description: DMN-TCK subset conformance on the Decision Engine SPI reference engine (Drools) + capability-descriptor conformance (build plan 2.1).
  - id: decision-engine-spi
    kind: pattern
    path: core/src/main/kotlin/ai/ichiflow/core/decision/spi
    description: The engine-neutral Decision Engine SPI (ADR-0002) + its Drools reference impl; only this package may depend on org.kie.
  - id: dmn-tck-subset
    kind: pattern
    path: core/src/main/resources/dmn/tck
    description: Curated DMN-TCK subset models (decision tables, FEEL built-ins, BKM/invocation/context) for SPI conformance.
  - id: decision-tck-cases
    kind: pattern
    path: schemas/decision-tck/cases.json
    description: Expected-outcome vectors for the DMN-TCK subset consumed by the decision-layer scope.
  - id: projection-coverage-matrix
    kind: pattern
    path: schemas/decision-source/projection/matrix.json
    description: The DMN feature matrix (build plan 2.2) — each construct's decision-source, inputs, and expected outcome; projected to DMN 1.6 and executed on the SPI engine by runProjectionCoverage.
  - id: decision-contracts
    kind: pattern
    path: schemas/decision-contracts.tsp
    description: Canonical typed decision contracts (build plan 2.3) — Outcome/CompositeOutcome/Condition + the frozen DecisionTrace shape (doc 02 §9.3, doc 03 §7). TypeSpec authoring; emitted JSON Schema is the contract of record.
  - id: decision-testing-contracts
    kind: pattern
    path: schemas/decision-testing.tsp
    description: Canonical decision-testing contracts (build plan 2.4) — the governed Harness (scenario suite + coverage gate) and FeelVector shapes (doc 03 §6). TypeSpec authoring; emitted JSON Schema is the contract of record.
  - id: decision-harness-fixture
    kind: pattern
    path: schemas/decision-harness
    description: A DecisionModel's governed Harness (loan-eligibility) — scenario suite + coverage threshold + the decision-source model under test; run by runScenarioCoverage for scenarios_pass/total + the coverage gate (doc 03 §6.1/§6.2).
  - id: feel-semantics-vectors
    kind: pattern
    path: schemas/decision-feel/vectors.json
    description: Frozen FEEL semantics vectors (build plan 2.4, doc 13 §2.b) — interchange-ambiguous expressions pinned to the reference engine's chosen result; run by runFeelVectors for feel_vectors_green/total.
  - id: code-quality
    kind: harness
    path: packages/cli/src/verify/scopes/code-quality.ts
    description: Kotlin quality gate — detekt (zero findings) + ArchUnit rules (SPI boundary), both build-failing.
  - id: detekt-config
    kind: pattern
    path: core/config/detekt/detekt.yml
    description: detekt ruleset for the Kotlin core; deviations from defaults are recorded here.
  - id: contracts-ts
    kind: generated
    path: packages/contracts-ts/src/gen
    description: Generated TypeScript contract types (hey-api). Regenerate with pnpm codegen:ts; never hand-edit.
  - id: contracts-kotlin
    kind: generated
    path: core/generated/src/main/kotlin
    description: Generated Kotlin contract models (Fabrikt). Regenerate with ./gradlew generateModels; never hand-edit.
  - id: contract-gate
    kind: harness
    path: packages/cli/src/verify/scopes/contract-gate.ts
    description: OpenAPI breaking-change gate (oasdiff) — zero unaccepted breaking changes vs the baseline.
  - id: contract-baseline
    kind: schema
    path: schemas/contract/openapi.baseline.yaml
    description: Released OpenAPI contract baseline; oasdiff compares the emitted contract against it. Advance via `pnpm contract:accept`.
  - id: flow-interpreter
    kind: pattern
    path: packages/flow/src/interpreter.ts
    description: The generic Temporal flow interpreter (build plan 3.0, ADR-0003/0004) — one workflow that walks any flow's ordered steps; compute steps go through activities, sla steps are Temporal timers. Its determinism is the whole flow layer's correctness property.
  - id: interpreter-determinism-spike
    kind: harness
    path: packages/cli/src/verify/scopes/interpreter-determinism-spike.ts
    description: Riskiest-bet proof (doc 14 §6) — replay-twice determinism (no non-determinism violation) + SLA-timer fast-forward under Temporal time-skip. Consumes the artifact from `pnpm interpreter:spike`.
  - id: flow-dsl
    kind: schema
    path: schemas/flow.tsp
    description: Canonical Flow DSL (build plan 3.1–3.3, ADR-0004/0005, doc 04 §2/§5) — the schema-validated flow-JSON document the generic interpreter walks over a named-variable blackboard. Closed core step set (compute via a versioned code-activity ref, decision-eval, human-task with assignment-as-Decision + pausable SLA + escalation, timer). TypeSpec authoring; emitted JSON Schema is the contract of record.
  - id: flow-conformance-vectors
    kind: pattern
    path: schemas/flow/vectors
    description: Flow conformance vectors (build plan 3.1–3.3) — DSL-valid Flow documents (+ scripted resolve/pause/resume signals) paired with the final blackboard, step trace, scheduled SLA, and pinned Case/Task event history the interpreter must produce; run by `pnpm flow:conformance` for vectors_green/total + replay determinism under time-skip.
  - id: flow-layer
    kind: harness
    path: packages/cli/src/verify/scopes/flow-layer.ts
    description: Flow interpreter + Case/Task conformance gate (build plan 3.1–3.3) — committed vectors are DSL-valid and each interprets to its pinned oracle (blackboard, steps, SLA, complete step trace, Case/Task event history keyed by case_id) with clean replay determinism under time-skip, across compute/decision-eval/human-task (assignment-as-Decision, pausable SLA, escalation)/timer. Also asserts real-source DecisionRecord completeness — every vector stitches into a gap-free causal chain (orphan detector clean). Consumes the artifact from `pnpm flow:conformance`.
  - id: decisionrecord-schema
    kind: schema
    path: schemas/decisionrecord.tsp
    description: Canonical DecisionRecord (build plan 3.4, ADR-0011, doc 08 §1) — the first-class typed domain object keyed by case_id that stitches flow event history + fired-Decision traces + Task resolutions into one auditable causal chain, plus the orphan verdict. TypeSpec authoring; emitted JSON Schema is the contract of record.
  - id: decisionrecord-cases
    kind: pattern
    path: schemas/decisionrecord/cases
    description: DecisionRecord case fixtures (build plan 3.4, harness-first) — FlowResults paired with their pinned assembled record (chain-completeness, orphans, stitched Decision/Task counts); positive fixtures stitch clean, negative fixtures inject a gap the orphan detector must flag. Assembled by `pnpm decisionrecord:assemble`.
  - id: decisionrecord
    kind: harness
    path: packages/cli/src/verify/scopes/decisionrecord.ts
    description: DecisionRecord assembler + orphan-event detector gate (build plan 3.4, doc 13 §2.g) — committed case fixtures are DSL-valid and each assembles (pure projection of a FlowResult) to its pinned stitched chain / orphan verdict keyed by case_id, with the detector proven on negative fixtures. Consumes the artifact from `pnpm decisionrecord:assemble`.
  - id: entity-schema
    kind: schema
    path: schemas/entity.tsp
    description: Canonical domain entity-store contracts (build plan 4.1, ADR-0018/0012, doc 13) — the reference business entity (LoanApplication), entity metadata (id/caseId/entityType/optimistic version/deterministic create-update sequence stamps/soft-delete), append-only audit-log record, transactional-outbox record, query/pagination/search, and the entity-store conformance-vector DSL. TypeSpec authoring; emitted JSON Schema is the contract of record.
  - id: entity-store-vectors
    kind: pattern
    path: schemas/entity-store/vectors
    description: Entity-store conformance vectors (build plan 4.1, harness-first) — CRUD/query op sequences paired with their pinned audit-log + transactional-outbox oracle (ordered operation/version/id + full delivery); cover create-read round-trip, update+version increment, exact-match filter, free-text search, deterministic pagination, and soft-delete invisibility. Replayed by `pnpm entity:jvm` against a fresh Repository SPI binding per vector.
  - id: entity-store
    kind: harness
    path: packages/cli/src/verify/scopes/entity-store.ts
    description: Domain entity-store gate (build plan 4.1, doc 13) — committed vectors are DSL-valid, every persisted payload validates against the schema-defined entity (LoanApplication) at the boundary, and each round-trips on the deterministic Repository SPI reference binding to its pinned audit/outbox oracle with the outbox fully delivered by the relay (transactional-outbox liveness). Consumes the artifact from `pnpm entity:jvm`.
  - id: entity-api-schema
    kind: schema
    path: schemas/entity-api.tsp
    description: Canonical generated-BFF API surface over the entity store (build plan 4.2, ADR-0018, doc 02 §5) — the LoanApplication CRUD/list HTTP operations authored on the BFF service, the record/page response shapes, the 404/422 error models, and the API-contract-vector DSL. TypeSpec authoring; the emitted OpenAPI 3.1 (and JSON Schema) is the contract that validates every request/response at the runtime boundary (zero-drift).
  - id: entity-api-vectors
    kind: pattern
    path: schemas/entity-api/vectors
    description: API-contract conformance vectors (build plan 4.2, harness-first) — named sequences of HTTP requests against the generated BFF, each pinned to a status + response shape (created/read/updated/soft-deleted record ids+versions, list ids+totals, and 404/422 error codes). Cover the CRUD lifecycle, query/filter/search/pagination, and runtime boundary rejection of malformed writes. Replayed by `pnpm api:contract` through a fresh BFF+store per vector and validated against the emitted OpenAPI.
  - id: entity-api
    kind: harness
    path: packages/cli/src/verify/scopes/entity-api.ts
    description: Generated-BFF gate (build plan 4.2, doc 13) — committed API-contract vectors are DSL-valid, every response validates against the emitted OpenAPI response schema for its status, every non-verify operation is exercised, and the runtime boundary validator provably rejects malformed writes (≥1 422). Consumes the artifact from `pnpm api:contract`.
  - id: authz-schema
    kind: schema
    path: schemas/authz.tsp
    description: Canonical authorization (PDP) contracts (build plan 4.3, ADR-0010/0025, doc 06 Parts 2 & 4, doc 13 §2.f) — the OpenFGA-style ReBAC model (types/relations/userset rewrites), relationship tuples, allow/deny vectors tagged by enforcement surface (design-time artifact vs runtime case/entity), and the mandatory authorization decision log. TypeSpec authoring; emitted JSON Schema is the contract of record.
  - id: authz-model
    kind: pattern
    path: schemas/authz/model.json
    description: The committed OpenFGA-shaped authorization model (doc 06 §4.3–4.4) — organization/team/artifact/case/association types with membership, role-as-relation (steward/approver/editor/viewer), ownership, derived can_* relations, and case associations (peer-link read access). Validated against the emitted AuthzModel schema; bound by the reference PolicyEngine.
  - id: authz-vectors
    kind: pattern
    path: schemas/authz/vectors
    description: Authz allow/deny vector corpus (build plan 4.3, harness-first) — design-time artifact-access and runtime case/entity-access checks over one relationship graph (schemas/authz/tuples.json), covering direct/nested Team membership, each role, ownership inheritance, assignee and association-reader access, and negative cross-team/cross-case cases (read-without-leak). Replayed by `pnpm authz:jvm` through the PDP.
  - id: authz
    kind: harness
    path: packages/cli/src/verify/scopes/authz.ts
    description: PDP-slice gate (build plan 4.3, doc 13 §2.f) — the model + vectors are schema-valid, every vector replays to its pinned allow/deny across the required relations (vectors_green == total), both design-time and runtime surfaces are covered by one PDP with design-time = runtime parity, and every decision emits a schema-valid decision log. Consumes the artifact from `pnpm authz:jvm`.
  - id: portal-fixtures
    kind: pattern
    path: packages/portal/fixtures
    description: Deterministic Portal fixtures (build plan 4.4, harness-first, doc 07 §5/§7/§11) — seeded Tasks/Cases with integer SLA deadlines, relationship tuples over the SAME authz relation model (schemas/authz/model.json), seeded principals with their pinned PDP-permitted inbox id sets (incl. a cross-team principal who sees fewer rows), per-principal field-entitlement scenarios, an assembled FlowResult per case for the decision trace, and the INTERIM hand-authored action-form uischema + data schema (packages/uischema wiring is a later follow-up). Consumed by the harness that `pnpm portal:preview` runs.
  - id: portal
    kind: harness
    path: packages/cli/src/verify/scopes/portal.ts
    description: First-Portal gate (build plan 4.4, doc 07 §5/§7/§11, doc 13 §2.e/§2.f) — the back-office Task inbox is PDP-filtered to exactly the permitted id set per seeded principal (rows_visible == expected, incl. a cross-team principal seeing strictly fewer rows) and SLA-ordered soonest-due first, the Case/review action form emits a Flow signal that validates against the emitted FlowSignal schema (never a direct mutation), the assembled DecisionRecord validates against the emitted DecisionRecord schema and its trace nodes render, and field-level entitlements render ≥1 hidden (with a "why?" affordance) + ≥1 read-only for a lower-privilege principal. Consumes the artifact from `pnpm portal:preview`.

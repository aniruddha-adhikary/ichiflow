# The resources manifest (doc 10 §2.5, BRIEF §12): version pins + named resources an agent may
# reach for. Schema-validated against @ichiflow/schemas/resources-manifest by the agent-kit scope.
version: "1"

pins:
  - id: node
    version: "20"
    note: TS-edge runtime; engine-strict in .npmrc.
  - id: pnpm
    version: "9.15.0"
    note: Workspace package manager (packageManager field pins it).
  - id: typespec
    version: "0.67.0"
    note: Schema authoring compiler + json-schema/openapi3 emitters (ADR-0006). Bump reruns schema drift.
  - id: jdk
    version: "17"
    note: Kotlin core / future KIE embedding baseline (ADR-0007).
  - id: gradle
    version: "8.10.2"
    note: Kotlin core build (wrapper pinned in core/gradle/wrapper).
  - id: networknt-json-schema-validator
    version: "1.5.4"
    note: Independent JVM JSON Schema 2020-12 validator for the cross-language fidelity spike.
  - id: hey-api-openapi-ts
    version: "0.80.0"
    note: TypeScript contract-type generator from OpenAPI (build plan 1.2). 0.80.x is the last line supporting Node 20; bump reruns codegen drift.
  - id: fabrikt
    version: "26.1.0"
    note: Kotlin contract-model generator from OpenAPI (build plan 1.2). Bump reruns ./gradlew checkModelsUpToDate.
  - id: kie-dmn
    version: "10.2.0"
    note: Apache KIE / Drools DMN — v1 reference decision engine (ADR-0002). Pinned; a bump reruns the decision-projection-spike + decision-layer. DMN 1.6 (spec 20240513).
  - id: oasdiff
    version: "1.21.0"
    note: OpenAPI breaking-change detector for the contract-gate scope (chunk 1.4a). Go release binary; installed in CI and run via `pnpm contract:diff`.
  - id: detekt
    version: "1.23.7"
    note: Kotlin static-analysis gate (non-negotiable). Fails ./gradlew check and the code-quality scope on any finding; config in core/config/detekt/detekt.yml.
  - id: archunit
    version: "1.3.0"
    note: Architecture-rule tests (archunit-junit5) enforcing the Decision Engine SPI boundary. Fails ./gradlew test and the code-quality scope on violation.

resources:
  - id: run-verify
    kind: skill
    path: .claude/skills/run-verify/SKILL.md
    description: Run ichiflow verify and read the JSON verdict.
  - id: add-schema
    kind: skill
    path: .claude/skills/add-schema/SKILL.md
    description: Author a canonical type in TypeSpec and regenerate.
  - id: verdict-envelope
    kind: schema
    path: schemas/verdict.tsp
    description: The verify verdict envelope contract (doc 13 §3.2).
  - id: self-check
    kind: harness
    path: packages/cli/src/verify/scopes/self-check.ts
    description: The meta-harness — the harness that judges harnesses.
  - id: schema-fidelity-spike
    kind: harness
    path: packages/cli/src/verify/scopes/schema-fidelity-spike.ts
    description: Cross-language JSON Schema fidelity — Ajv (TS) vs networknt (JVM) must agree.
  - id: schema-pipeline
    kind: harness
    path: packages/cli/src/verify/scopes/schema-pipeline.ts
    description: Emitted contract artifacts (OpenAPI 3.1 + JSON Schema 2020-12) exist and are well-formed.
  - id: verify-api
    kind: schema
    path: schemas/service.tsp
    description: The verify status API surface (TypeSpec → OpenAPI 3.1).
  - id: codegen
    kind: harness
    path: packages/cli/src/verify/scopes/codegen.ts
    description: Generated TS (hey-api) + Kotlin (Fabrikt) edges cover every OpenAPI component schema.
  - id: contract-vectors
    kind: harness
    path: packages/cli/src/verify/scopes/contract-vectors.ts
    description: Cross-language accept/reject vectors for the real contract — Ajv (TS) vs networknt (JVM) must agree.
  - id: contract-corpus
    kind: pattern
    path: schemas/vectors/contract-corpus.json
    description: Labelled validation vectors for the real emitted contract (build plan 1.3).
  - id: reference-data
    kind: harness
    path: packages/cli/src/verify/scopes/reference-data.ts
    description: CodeSet fixtures conform to the contract and every cross-CodeSet codeRef resolves to a live, in-window row (ADR-0025).
  - id: codeset-schema
    kind: schema
    path: schemas/reference-data.tsp
    description: The CodeSet reference-data artifact class (TypeSpec → JSON Schema); rows carry codeRef foreign keys.
  - id: codeset-fixtures
    kind: pattern
    path: schemas/reference-data/fixtures
    description: Interdependent CodeSet fixtures exercising cross-version, effective-dated codeRef integrity.
  - id: decision-projection-spike
    kind: harness
    path: packages/cli/src/verify/scopes/decision-projection-spike.ts
    description: Compiled decision-source → DMN 1.6 executes identically to the hand-authored reference on KIE/Drools (build plan 2.0).
  - id: decision-source-fixture
    kind: pattern
    path: schemas/decision-source/fixtures/fee.decision.json
    description: decision-source authoring fixture (hard boxed-expression kinds) projected one-way to DMN (ADR-0027).
  - id: dmn-reference
    kind: pattern
    path: core/src/main/resources/dmn/reference/fee.dmn
    description: Hand-authored DMN 1.6 reference the projection spike executes against for behavioural equivalence.
  - id: decision-layer
    kind: harness
    path: packages/cli/src/verify/scopes/decision-layer.ts
    description: DMN-TCK subset conformance on the Decision Engine SPI reference engine (Drools) + capability-descriptor conformance (build plan 2.1).
  - id: decision-engine-spi
    kind: pattern
    path: core/src/main/kotlin/ai/ichiflow/core/decision/spi
    description: The engine-neutral Decision Engine SPI (ADR-0002) + its Drools reference impl; only this package may depend on org.kie.
  - id: dmn-tck-subset
    kind: pattern
    path: core/src/main/resources/dmn/tck
    description: Curated DMN-TCK subset models (decision tables, FEEL built-ins, BKM/invocation/context) for SPI conformance.
  - id: decision-tck-cases
    kind: pattern
    path: schemas/decision-tck/cases.json
    description: Expected-outcome vectors for the DMN-TCK subset consumed by the decision-layer scope.
  - id: projection-coverage-matrix
    kind: pattern
    path: schemas/decision-source/projection/matrix.json
    description: The DMN feature matrix (build plan 2.2) — each construct's decision-source, inputs, and expected outcome; projected to DMN 1.6 and executed on the SPI engine by runProjectionCoverage.
  - id: decision-contracts
    kind: pattern
    path: schemas/decision-contracts.tsp
    description: Canonical typed decision contracts (build plan 2.3) — Outcome/CompositeOutcome/Condition + the frozen DecisionTrace shape (doc 02 §9.3, doc 03 §7). TypeSpec authoring; emitted JSON Schema is the contract of record.
  - id: decision-testing-contracts
    kind: pattern
    path: schemas/decision-testing.tsp
    description: Canonical decision-testing contracts (build plan 2.4) — the governed Harness (scenario suite + coverage gate) and FeelVector shapes (doc 03 §6). TypeSpec authoring; emitted JSON Schema is the contract of record.
  - id: decision-harness-fixture
    kind: pattern
    path: schemas/decision-harness
    description: A DecisionModel's governed Harness (loan-eligibility) — scenario suite + coverage threshold + the decision-source model under test; run by runScenarioCoverage for scenarios_pass/total + the coverage gate (doc 03 §6.1/§6.2).
  - id: feel-semantics-vectors
    kind: pattern
    path: schemas/decision-feel/vectors.json
    description: Frozen FEEL semantics vectors (build plan 2.4, doc 13 §2.b) — interchange-ambiguous expressions pinned to the reference engine's chosen result; run by runFeelVectors for feel_vectors_green/total.
  - id: code-quality
    kind: harness
    path: packages/cli/src/verify/scopes/code-quality.ts
    description: Kotlin quality gate — detekt (zero findings) + ArchUnit rules (SPI boundary), both build-failing.
  - id: detekt-config
    kind: pattern
    path: core/config/detekt/detekt.yml
    description: detekt ruleset for the Kotlin core; deviations from defaults are recorded here.
  - id: contracts-ts
    kind: generated
    path: packages/contracts-ts/src/gen
    description: Generated TypeScript contract types (hey-api). Regenerate with pnpm codegen:ts; never hand-edit.
  - id: contracts-kotlin
    kind: generated
    path: core/generated/src/main/kotlin
    description: Generated Kotlin contract models (Fabrikt). Regenerate with ./gradlew generateModels; never hand-edit.
  - id: contract-gate
    kind: harness
    path: packages/cli/src/verify/scopes/contract-gate.ts
    description: OpenAPI breaking-change gate (oasdiff) — zero unaccepted breaking changes vs the baseline.
  - id: contract-baseline
    kind: schema
    path: schemas/contract/openapi.baseline.yaml
    description: Released OpenAPI contract baseline; oasdiff compares the emitted contract against it. Advance via `pnpm contract:accept`.

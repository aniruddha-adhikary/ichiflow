openapi: 3.1.0
info:
  title: ichiflow verify API
  version: 0.0.0
  description: |-
    The verify status API (build plan chunk 1.1, ADR-0006). A minimal but real HTTP surface whose sole
    purpose in Phase 1 is to exercise the TypeSpec→OpenAPI 3.1 emit + regenerate-and-diff drift path
    on the same authoring source that feeds JSON Schema. It reuses the canonical `VerdictEnvelope`, so
    the OpenAPI document and the JSON Schema stay derived from one model — the whole point of ADR-0006.
tags: []
paths:
  /loan-applications:
    post:
      operationId: LoanApplications_create
      description: Create a LoanApplication (boundary-validated); 201 with the persisted record, or 422.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ichiflow.Entity.LoanApplicationRecord'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoundaryValidationError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ichiflow.Entity.LoanApplication'
    get:
      operationId: LoanApplications_list
      description: List LoanApplications with deterministic sort/pagination + exact-match/free-text filtering.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: sort
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: search
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Ichiflow.Entity.LoanStatus'
          explode: false
        - name: productCode
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ichiflow.Entity.LoanApplicationPage'
  /loan-applications/{id}:
    get:
      operationId: LoanApplications_read
      description: Fetch a single live LoanApplication by id, or 404 if absent/soft-deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ichiflow.Entity.LoanApplicationRecord'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityNotFound'
    patch:
      operationId: LoanApplications_update
      description: Update a LoanApplication (boundary-validated); increments version, or 404/422.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ichiflow.Entity.LoanApplicationRecord'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityNotFound'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoundaryValidationError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ichiflow.Entity.LoanApplicationUpdate'
    delete:
      operationId: LoanApplications_remove
      description: Soft-delete a LoanApplication; 204, or 404 if absent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityNotFound'
  /verify/{scope}:
    get:
      operationId: Verify_status
      description: Latest verdict for a scope, or 404 if the scope has never run.
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ichiflow.Verify.VerdictEnvelope'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
components:
  schemas:
    BoundaryValidationError:
      type: object
      required:
        - code
        - message
        - errors
      properties:
        code:
          type: string
          enum:
            - validation-failed
        message:
          type: string
        errors:
          type: array
          items:
            type: string
          description: Structured validation errors (Ajv messages) — never prose.
    EntityNotFound:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - entity-not-found
        message:
          type: string
    Ichiflow.Entity.EntityMeta:
      type: object
      required:
        - id
        - entityType
        - version
        - createdSeq
        - updatedSeq
        - deleted
      properties:
        id:
          type: string
          description: Stable store id (unique per entity type).
        caseId:
          type: string
          description: The correlating global `case_id` (ADR-0012); absent for entities not yet bound to a Case.
        entityType:
          type: string
          description: The entity type discriminator, e.g. `LoanApplication`.
        version:
          type: integer
          format: int32
          minimum: 1
          description: Optimistic-concurrency version — 1 on create, incremented on each update.
        createdSeq:
          type: integer
          format: int64
          minimum: 0
          description: Monotonic sequence stamp at create time.
        updatedSeq:
          type: integer
          format: int64
          minimum: 0
          description: Monotonic sequence stamp at the last mutation.
        deleted:
          type: boolean
          description: Soft-delete tombstone — a deleted record is retained (for audit) but excluded from queries.
      description: |-
        Store-owned metadata stamped on every persisted record (ADR-0018/0012): stable id, the correlating
        global `case_id`, the entity type, an optimistic-concurrency `version`, monotonic create/update
        sequence stamps (the deterministic stand-in for wall-clock timestamps in the harness), and the
        soft-delete tombstone.
    Ichiflow.Entity.LoanApplication:
      type: object
      required:
        - applicant
        - amount
        - productCode
        - status
      properties:
        applicant:
          type: string
          description: The applicant's display name (also the default free-text search field).
        amount:
          type: number
          format: double
          minimum: 0
          description: Requested principal amount.
        productCode:
          type: string
          description: The permit/product code this application is for (a `CodeSet` codeRef in the full model).
        status:
          $ref: '#/components/schemas/Ichiflow.Entity.LoanStatus'
      description: |-
        The v1 **reference domain entity** (ADR-0018) — an ordinary business record the store persists,
        lists, queries, and audits. Its persisted shape is schema-defined here; the store validates writes
        against this contract at the boundary.
    Ichiflow.Entity.LoanApplicationPage:
      type: object
      required:
        - total
        - page
        - size
        - items
      properties:
        total:
          type: integer
          format: int32
          minimum: 0
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ichiflow.Entity.LoanApplicationRecord'
      description: A page of full records for the list endpoint (detail rows, in the query's deterministic order).
    Ichiflow.Entity.LoanApplicationRecord:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/Ichiflow.Entity.LoanApplication'
        meta:
          $ref: '#/components/schemas/Ichiflow.Entity.EntityMeta'
      description: A persisted record as returned over the API — the entity payload plus store-owned metadata.
    Ichiflow.Entity.LoanApplicationUpdate:
      type: object
      properties:
        applicant:
          type: string
          description: The applicant's display name (also the default free-text search field).
        amount:
          type: number
          format: double
          minimum: 0
          description: Requested principal amount.
        productCode:
          type: string
          description: The permit/product code this application is for (a `CodeSet` codeRef in the full model).
        status:
          $ref: '#/components/schemas/Ichiflow.Entity.LoanStatus'
      description: |-
        The v1 **reference domain entity** (ADR-0018) — an ordinary business record the store persists,
        lists, queries, and audits. Its persisted shape is schema-defined here; the store validates writes
        against this contract at the boundary.
    Ichiflow.Entity.LoanStatus:
      type: string
      enum:
        - draft
        - submitted
        - approved
        - declined
      description: Lifecycle status of the v1 reference entity (a permit/benefit-style application record).
    Ichiflow.Verify.CheckResult:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Stable check id, e.g. `self-check.envelope-schema`.
        status:
          $ref: '#/components/schemas/Ichiflow.Verify.CheckStatus'
        artifact:
          type: string
          description: The artifact this check is about, if any (e.g. `decision:loan-eligibility@3.2.0`).
        expected:
          description: Expected value for a failed check (structured, not prose).
        actual:
          description: Actual value for a failed check (structured, not prose).
        diff:
          type: string
          description: A short structured diff string; supplements expected/actual.
        metric:
          type: string
          description: Named metric for coverage-style checks (e.g. `rule-coverage`).
        value:
          type: number
          format: double
          description: Metric value for a coverage-style check.
        threshold:
          type: number
          format: double
          description: Metric threshold for a coverage-style check.
      description: |-
        One check result. Failures carry a structured diff (expected/actual/artifact), never a
        sentence. `id` is stable across runs so a dashboard and an agent track the same check.
    Ichiflow.Verify.CheckStatus:
      type: string
      enum:
        - pass
        - fail
        - skip
      description: Outcome of a single enumerated check.
    Ichiflow.Verify.ConformanceProgress:
      type: object
      required:
        - green
        - total
      properties:
        green:
          type: integer
          format: int32
          minimum: 0
        total:
          type: integer
          format: int32
          minimum: 0
      description: 'Enumerable "how much is done": green vs total over the conformance suite.'
    Ichiflow.Verify.CoverageProgress:
      type: object
      required:
        - value
        - threshold
        - met
      properties:
        value:
          type: number
          format: double
          minimum: 0
          maximum: 1
        threshold:
          type: number
          format: double
          minimum: 0
          maximum: 1
        met:
          type: boolean
      description: Coverage ratio against a declared threshold.
    Ichiflow.Verify.Progress:
      type: object
      properties:
        conformance:
          $ref: '#/components/schemas/Ichiflow.Verify.ConformanceProgress'
        coverage:
          $ref: '#/components/schemas/Ichiflow.Verify.CoverageProgress'
      description: The progress metric block — a count/ratio, never a narrative estimate.
    Ichiflow.Verify.Verdict:
      type: string
      enum:
        - pass
        - fail
      description: pass | fail — the only two verdicts a scope may emit.
    Ichiflow.Verify.VerdictEnvelope:
      type: object
      required:
        - verifyVersion
        - scope
        - ranAt
        - seed
        - verdict
        - summary
        - progress
        - checks
        - flaky
      properties:
        verifyVersion:
          type: string
          description: Envelope schema version.
        scope:
          type: string
          description: The scope that produced this verdict (e.g. `self-check`, `schema-pipeline`).
        ranAt:
          type: string
          format: date-time
          description: ISO-8601 UTC timestamp of the run.
        seed:
          type: string
          description: Seed for deterministic time/data (§3.6); recorded so a run is reproducible.
        verdict:
          $ref: '#/components/schemas/Ichiflow.Verify.Verdict'
        summary:
          $ref: '#/components/schemas/Ichiflow.Verify.VerdictSummary'
        progress:
          $ref: '#/components/schemas/Ichiflow.Verify.Progress'
        checks:
          type: array
          items:
            $ref: '#/components/schemas/Ichiflow.Verify.CheckResult'
        flaky:
          type: boolean
          description: Must always be false — a flaky check is a harness defect, not a retry (§3.6).
      description: The verdict envelope emitted by every verify scope.
    Ichiflow.Verify.VerdictSummary:
      type: object
      required:
        - checks
        - passed
        - failed
        - skipped
      properties:
        checks:
          type: integer
          format: int32
          minimum: 0
        passed:
          type: integer
          format: int32
          minimum: 0
        failed:
          type: integer
          format: int32
          minimum: 0
        skipped:
          type: integer
          format: int32
          minimum: 0
      description: Count summary across the scope's checks.
    NotFound:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - scope-not-found
        message:
          type: string
